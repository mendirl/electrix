services:
    postgres:
        image: 'postgres:latest'
        environment:
            POSTGRES_PASSWORD: electrix
            POSTGRES_USER: electrix
        ports:
            - "5431:5432"

    clickhouse:
        image: clickhouse
        hostname: clickhouse
        container_name: clickhouse
        restart: always
        ports:
            - "8123:8123"
            - "9000:9000"
        environment:
            CLICKHOUSE_USER: electrix
            CLICKHOUSE_PASSWORD: electrix

    keycloak:
        image: keycloak/keycloak
        hostname: keycloak
        container_name: keycloak
        restart: always
        command: start-dev
        ports:
            - "8080:8080"
        environment:
            KC_BOOTSTRAP_ADMIN_USERNAME: admin
            KC_BOOTSTRAP_ADMIN_PASSWORD: admin

